<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | NileVoice AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="register">
    <div class="auth-page">
      <div class="auth-card glass-card">
        <div class="auth-brand">
          <a href="index.html" class="logo">
            <span class="logo-icon">N</span>
            NileVoice AI
          </a>
        </div>
        <h2>Create Account</h2>
        <p>Join our community and start contributing.</p>
        <form id="registerForm">
          <div class="field-group">
            <label for="registerName">Full Name</label>
            <input type="text" id="registerName" placeholder="Jane Doe" />
          </div>
          <div class="field-group">
            <label for="registerEmail">Email</label>
            <input type="email" id="registerEmail" placeholder="jane@example.com" />
          </div>
          <div class="field-group">
            <label for="registerUsername">Username</label>
            <input type="text" id="registerUsername" placeholder="jane_ai" />
          </div>
          <div class="field-group">
            <label for="registerPassword">Password</label>
            <input type="password" id="registerPassword" placeholder="Create a password" />
            <div class="password-strength" id="passwordStrength"></div>
          </div>
          <div class="field-group">
            <label for="registerConfirmPassword">Confirm Password</label>
            <input type="password" id="registerConfirmPassword" placeholder="Repeat password" />
          </div>
          <div class="auth-options checkbox-row">
            <label><input type="checkbox" id="agreeTerms" /> I agree to the terms and conditions</label>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Register</button>
          <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
